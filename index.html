async function llegirSheets(sheetsId,tok){
  // Llegir totes les pestanyes del Sheets
  const metaUrl="https://sheets.googleapis.com/v4/spreadsheets/"+sheetsId+"?fields=sheets.properties.title";
  const metaR=await fetch(metaUrl,{headers:{Authorization:"Bearer "+tok}});
  if(!metaR.ok)throw new Error("Error llegint Sheets: "+metaR.status);
  const meta=await metaR.json();
  const sheets=meta.sheets||[];
  const mestres={};
  // Llegir CONFIG primer
  const configSheet=sheets.find(s=>s.properties.title==="CONFIG");
  let frangesConfig=null;
  if(configSheet){
    const cfgData=await llegirPestanya(sheetsId,"CONFIG",tok);
    frangesConfig=parseFrangesConfig(cfgData);
  }
  const franges=frangesConfig||state.franges;
  // Llegir cada pestanya de mestre
  for(const sheet of sheets){
    const title=sheet.properties.title;
    if(title==="CONFIG"||title==="PLANTILLA_MESTRE") continue;
    const data=await llegirPestanya(sheetsId,title,tok);
    const horari=parseSheetMestre(data,franges);
    if(horari&&Object.keys(horari).length>0){
      mestres[title.toUpperCase()]=horari;
    }
  }
  return{mestres,franges};
}

async function llegirPestanya(sheetsId,title,tok){
  const url="https://sheets.googleapis.com/v4/spreadsheets/"+sheetsId+"/values/"+encodeURIComponent(title)+"!A1:G20";
  const r=await fetch(url,{headers:{Authorization:"Bearer "+tok}});
  if(!r.ok) return [];
  const data=await r.json();
  return data.values||[];
}

function parseFrangesConfig(rows){
  const franges=[];
  for(let i=2;i<rows.length;i++){
    const row=rows[i];
    if(!row||!row[0]||row[0]==="ID") continue;
    const fid=row[0].trim();
    const label=row[1]?.trim()||fid;
    const inici=row[2]?.trim()||"";
    if(fid) franges.push({id:fid,label:label,inici:inici,fi:""});
  }
  return franges.length>0?franges:null;
}

function parseSheetMestre(rows,franges){
  if(!rows||rows.length<3) return null;
  // Fila 0: nom mestre (ignorem)
  // Fila 1: capçalera FRANJA, Dilluns, Dimarts...
  // Files 2+: dades
  const DIES=["Dilluns","Dimarts","Dimecres","Dijous","Divendres"];
  const header=rows[1]||[];
  const colDia={};
  header.forEach((c,i)=>{
    const d=DIES.find(dia=>c.trim()===dia);
    if(d) colDia[i]=d;
  });
  if(Object.keys(colDia).length===0) return null;
  const horari={};
  for(let i=2;i<rows.length;i++){
    const row=rows[i];
    if(!row||!row[0]) continue;
    const fid=row[0].trim();
    if(!fid||fid==="FRANJA") continue;
    // Verificar que l'ID existeix a les franges
    const franjaOk=franges.find(f=>f.id===fid);
    if(!franjaOk) continue;
    Object.entries(colDia).forEach(([idx,dia])=>{
      const val=(row[parseInt(idx)]||"").trim();
      if(val){
        if(!horari[dia]) horari[dia]={};
        horari[dia][fid]=val;
      }
    });
  }
  return horari;
}

function extractSheetsId(url){const m=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);if(m)return m[1];if(/^[a-zA-Z0-9_-]{25,}$/.test(url.trim()))return url.trim();return null;}

const SOROLL=["ESBARJO","ESPAI MIGDIA","CLAUSTRES","COMISSIONS","FORMACIÓ","PER FER","REUNIONS",":-:","16:0","17H","8:30"];

function canonFranja(s,franges){
  const t=s.trim().replace(/\s/g,"");
  if(/^9[-\u20138]/.test(t)||t.startsWith("9:00"))return"9h";
  if(/^10[-\u20138]/.test(t)||t.startsWith("10:00"))return"10h";
  if(t.startsWith("11:30")||t.startsWith("11.30"))return"11:30h";
  if(t.startsWith("14:30")||t.startsWith("14.30"))return"14:30h";
  if(t.startsWith("15:15")||t.startsWith("15.15"))return"15:15h";
  for(const f of franges){const i=f.inici.replace(":","").replace(/^0/,"");if(t.startsWith(f.inici)||t.startsWith(i))return f.id;}
  return null;
}
const isTableRow=l=>l.trim().startsWith("|");
const cleanCell=s=>s.replace(/\\\*/g,"*").replace(/\\/g,"").trim();
function isSoroll(s){const u=s.toUpperCase().replace(/\s/g,"");return["ESBARJO","ESPAIMIGDIA","CLAUSTRES","COMISSIONS","FORMACIO","REUNIONS"].some(k=>u.includes(k));}
function parseHoraris(text,franges=FRANGES_DEFAULT){
  const m={};
  const blocks=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split(/\n{2,}/);
  for(const block of blocks){
    const lines=block.trim().split("\n").filter(l=>l.trim());
    if(!lines.length)continue;
    const hasTab=lines.some(l=>l.includes("\t"));
    if(hasTab){
      // Format tabuladors (Google Docs exportat com a text pla)
      // Cada taula comença amb una línia de capçalera tipus "Horari tutora X  Nom Cognom  Any"
      // Buscar el nom del mestre a la primera línia
      // Netejar \r (Windows line endings)
      const linesNet=lines.map(l=>l.replace(/\r/g,""));
      // Buscar nom del mestre a les primeres 3 línies (pot estar a la 2a línia)
      let nom=null;
      for(let li=0;li<Math.min(3,linesNet.length);li++){
        for(const cell of linesNet[li].split("\t").map(s=>s.trim())){
          const match=cell.match(/^([A-Z\u00C0-\u00DC][a-z\u00E0-\u00FC]+(?:\s+[A-Z\u00C0-\u00DC][a-z\u00E0-\u00FC]+)+)$/);
          if(match){nom=match[1].toUpperCase();break;}
        }
        if(nom)break;
      }
      // Si no hi ha nom de persona, és l'horari del grup -> ignorar
      if(!nom)continue;
      const linesN=linesNet;
      if(m[nom])continue;
      m[nom]={};
      let headerIdx=-1;const colDia={};
      for(let i=0;i<linesN.length;i++){
        const u=linesN[i].toUpperCase();
        if(u.includes("DILLUNS")||u.includes("DIMARTS")){
          headerIdx=i;
          linesN[i].split("\t").map(s=>s.trim()).forEach((c,idx)=>{
            const d=DIES.find(dia=>c.toUpperCase().includes(dia.toUpperCase()));
            if(d)colDia[idx]=d;
          });
          break;
        }
      }
      if(headerIdx<0)continue;
      for(let i=headerIdx+1;i<linesN.length;i++){
        if(isSoroll(linesN[i]))continue;
        const cells=linesN[i].split("\t").map(s=>s.trim());
        const franja=canonFranja(cells[0]||"",franges);
        if(!franja)continue;
        cells.forEach((c,idx)=>{
          if(colDia[idx]&&c&&c!=="-"&&!isSoroll(c)){
            if(!m[nom][colDia[idx]])m[nom][colDia[idx]]={};
            m[nom][colDia[idx]][franja]=c;
          }
        });
      }
      continue;
    }
    // Format pipe (|)
    const tableLines=lines.filter(l=>isTableRow(l));
    if(tableLines.length>=3){
      const nomLine=lines.find(l=>!isTableRow(l)&&l.trim().length>2)||"";
      const nomMatch=nomLine.match(/([A-Z\u00C0-\u00DC][a-z\u00E0-\u00FC]+(?:\s+[A-Z\u00C0-\u00DC][a-z\u00E0-\u00FC]+)+)/);
      if(!nomMatch)continue;
      const nom=nomMatch[1].toUpperCase();
      if(m[nom])continue;
      m[nom]={};
      const headerIdx=tableLines.findIndex(l=>{const u=l.toUpperCase();return u.includes("DILLUNS")||u.includes("DIMARTS");});
      if(headerIdx<0)continue;
      const headerCells=tableLines[headerIdx].split("|").map(cleanCell);
      const colDia={};
      headerCells.forEach((c,i)=>{const d=DIES.find(dia=>c.toUpperCase().includes(dia.toUpperCase()));if(d)colDia[i]=d;});
      for(const row of tableLines.slice(headerIdx+2)){
        if(isSoroll(row))continue;
        const cells=row.split("|").map(cleanCell);
        const franja=canonFranja(cells[0]||"",franges);
        if(!franja)continue;
        cells.forEach((c,i)=>{if(colDia[i]&&c&&c!=="-"&&!isSoroll(c)){if(!m[nom][colDia[i]])m[nom][colDia[i]]={};m[nom][colDia[i]][franja]=c;}});
      }
      continue;
    }
    const nom=lines[0].trim().toUpperCase();
    if(!nom||nom.length<2)continue;
    if(m[nom])continue;
    m[nom]={};
    for(let i=1;i<lines.length;i++){
      const line=lines[i].trim();
      const dia=DIES.find(d=>line.startsWith(d));
      if(!dia)continue;
      const after=line.slice(dia.length).replace(/^:/,"").trim();
      if(!m[nom][dia])m[nom][dia]={};
      for(const slot of after.split("|").map(s=>s.trim())){
        const fids=[...franges].map(f=>f.id).sort((a,b)=>b.length-a.length);
        const f=fids.find(f=>slot.startsWith(f));
        if(f)m[nom][dia][f]=slot.slice(f.length).trim();
      }
    }
  }
  return m;
}

function normalitza(s){return s.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();}
const NO_CAL_KW=["T.P.","TP.","T.P ","TREBALL PERSONAL","CAEI","ESBARJO","SUPORT","COORDINACIÓ","COORDINACIO","REUNIÓ","REUNIO","CÀRREC","CARREC","DOBLE:"];
const NO_DISP_KW=["CAEI","ESBARJO","PISCINA","COORDINACIÓ","COORDINACIO","REUNIÓ","REUNIO","CÀRREC","CARREC","DOBLE:"];
const TP_KW=["T.P.","TP.","T.P ","TREBALL PERSONAL"];
function calSuplir(act){if(!act)return false;const u=normalitza(act);if(u==="PISCINA")return true;return!NO_CAL_KW.some(k=>u===normalitza(k)||u.startsWith(normalitza(k)));}
function tipusSuplent(act){
  if(!act)return"LLIURE";const u=normalitza(act);
  if(u.startsWith("DOBLE:"))return"NO_DISPONIBLE";
  if(NO_DISP_KW.some(k=>u===normalitza(k)||u.startsWith(normalitza(k))))return"NO_DISPONIBLE";
  if(TP_KW.some(k=>u===normalitza(k)||u.startsWith(normalitza(k))))return"TP";
  // +Nom significa que el mestre TÉ CLASSE i el +Nom hi és de suport -> NO disponible
  if(act.includes("+")||act.includes("*"))return"CLASSE";
  if(u.startsWith("SUPORT"))return"SUPORT_GENERAL";
  return"CLASSE";
}
function actLabel(act){if(!act)return"—";if(normalitza(act).startsWith("DOBLE:"))return act.slice(6)+" (doble)";return act;}
function cercaBase(mestres,absent,dia,franja,ocupats=new Set()){
  const au=absent.toUpperCase();
  const actAbsent=mestres[au]?.[dia]?.[franja]||"";
  if(!calSuplir(actAbsent))return[{nom:null,p:-1,motiu:"No cal — tenia "+actLabel(actAbsent)}];
  const p1=[],p2=[],p3=[];
  for(const[nom,horari]of Object.entries(mestres)){
    if(nom===au||ocupats.has(nom))continue;
    const act=horari?.[dia]?.[franja]||"";
    const tipus=tipusSuplent(act);
    // P1: mestre que té "+NomAbsent" a la seva activitat (és de suport a l'aula de l'absent)
    // Buscar si l'activitat d'aquest mestre conté +inicialNomAbsent
    const nomCurt=au.split(" ")[0]; // primer cognom/nom
    if((act.includes("+")&&(act.toUpperCase().includes("+"+nomCurt)||act.toUpperCase().includes("+ "+nomCurt)))){
      p1.push({nom,act,p:1,motiu:"Suport natural — ja era a l'aula"});continue;
    }
    if(tipus==="NO_DISPONIBLE"||tipus==="CLASSE"||tipus==="LLIURE")continue;
    if(tipus==="SUPORT_GENERAL"){p2.push({nom,act,p:2,motiu:"Fa suport en una altra aula"});continue;}
    if(tipus==="TP")p3.push({nom,act,p:3,motiu:"⚠ Trenca T.P."});
  }
  const ord=(a,b)=>a.nom.localeCompare(b.nom);
  return[...p1.sort(ord),...p2.sort(ord),...p3.sort(ord)];
}
function assignacioMultiple(mestres,totsAbsents,dia,franjesSeleccionades,absentPerFranja,frangesConfig=FRANGES_DEFAULT){
  const resultat={};
  const franjesOrdenades=[...franjesSeleccionades].sort((a,b)=>frangesConfig.findIndex(f=>f.id===a)-frangesConfig.findIndex(f=>f.id===b));
  const continuitat=new Map();
  for(const franja of franjesOrdenades){
    const absentsAqui=absentPerFranja?.[franja]||[];
    if(!absentsAqui.length)continue;
    const ocupats=new Set(totsAbsents.map(a=>a.toUpperCase()));
    const assignacions=[];
    const ambInfo=absentsAqui.map(absent=>{
      const au=absent.toUpperCase();
      const actAbsent=mestres[au]?.[dia]?.[franja]||"";
      const cal=calSuplir(actAbsent);
      const candidats=cal?cercaBase(mestres,absent,dia,franja,new Set()).filter(c=>c.nom):[];
      return{absent,au,actAbsent,cal,candidats};
    });
    for(const{absent,actAbsent}of ambInfo.filter(a=>!a.cal)){
      assignacions.push({absent,suplent:null,act:actAbsent,p:-1,motiu:"No cal — tenia "+actLabel(actAbsent)});
    }
    const calList=ambInfo.filter(a=>a.cal);
    const assignatsCont=new Set();
    for(const{absent,au}of calList){
      const prev=continuitat.get(au);
      if(!prev||ocupats.has(prev))continue;
      const actPrev=mestres[prev]?.[dia]?.[franja]||"";
      const tipus=tipusSuplent(actPrev);
      if(tipus==="SUPORT_GENERAL"||tipus==="SUPORT_NATURAL"){
        ocupats.add(prev);assignatsCont.add(au);continuitat.set(au,prev);
        assignacions.push({absent,suplent:prev,act:actPrev,p:2,motiu:"Continuïtat"});
      }
    }
    const resta=calList.filter(a=>!assignatsCont.has(a.au)).sort((a,b)=>a.candidats.length-b.candidats.length);
    for(const{absent,au,candidats}of resta){
      const disp=candidats.filter(c=>!ocupats.has(c.nom));
      if(disp.length>0){
        const millor=disp[0];ocupats.add(millor.nom);continuitat.set(au,millor.nom);
        assignacions.push({absent,suplent:millor.nom,act:millor.act,p:millor.p,motiu:millor.motiu});
      } else {
        assignacions.push({absent,suplent:null,act:"",p:0,motiu:"⚠ Sense suplent disponible"});
      }
    }
    resultat[franja]=assignacions;
  }
  return resultat;
}

const cap=s=>s?s.charAt(0)+s.slice(1).toLowerCase():"";
const avuiDia=()=>{const d=new Date().getDay();return DIES[d===0||d===6?0:d-1];};

let state={page:"cercar",loggedIn:false,user:null,etapa:"primaria",mestres:{},franges:FRANGES_DEFAULT,fitxersCarregats:[],driveUrl:"",driveEstat:null,driveMsg:"",isLoadingDrive:false,registre:[],diaC:avuiDia(),absentsAmbFranges:[],resultatsMultiple:null,canvisManuals:{},diaAvui:avuiDia(),subpaginaAvui:"suplencies",criterisText:"",criterisGuardats:false,geminiKey:"",geminiActiu:false,geminiEstat:null};
function setState(patch){Object.assign(state,patch);render();}

function initGoogleLogin(){
  if(!window.google){setTimeout(initGoogleLogin,500);return;}
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredentialResponse,auto_select:false,cancel_on_tap_outside:false});
  if(!state.loggedIn)render();
}
function handleCredentialResponse(response){
  const payload=parseJwt(response.credential);
  currentUser={email:payload.email,name:payload.name,picture:payload.picture,accessToken:null};
  loadUserData();
  setState({loggedIn:true,user:currentUser});
}
function parseJwt(token){const base64=token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");return JSON.parse(atob(base64));}
function loginWithGoogle(){
  if(!window.google){alert("Google no carregat, torna-ho a intentar.");return;}
  // Usar ux_mode redirect per evitar problemes COOP amb GitHub Pages
  const client = google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:"email profile https://www.googleapis.com/auth/spreadsheets.readonly",
    ux_mode:"popup",
    callback:(tokenResponse)=>{
      if(tokenResponse.access_token){
        currentUser={...currentUser,accessToken:tokenResponse.access_token};
        state.user=currentUser;
        localStorage.setItem("sup_accessToken",tokenResponse.access_token);
        render();
      }
    }
  });
  client.requestAccessToken({prompt:"consent"});
}
function logout(){if(window.google)google.accounts.id.disableAutoSelect();localStorage.removeItem("sup_accessToken");currentUser=null;setState({loggedIn:false,user:null,mestres:{},registre:[],resultatsMultiple:null,criterisText:"",criterisGuardats:false,geminiKey:"",geminiActiu:false,etapa:"primaria"});}
function loadUserData(){
  // Carregar accessToken (compartit entre etapes)
  const at=localStorage.getItem("sup_accessToken");
  if(at&&currentUser)currentUser.accessToken=at;
  // Carregar dades per etapa actual
  const h=sGet("horaris");const r=sGet("registre");const cr=sGet("criteris");
  if(h?.mestres){state.mestres=h.mestres;if(h.franges)state.franges=h.franges;}
  else if(h?.text){state.mestres=parseHoraris(h.text,state.franges);}
  else{state.mestres={};state.franges=FRANGES_DEFAULT;}
  if(r?.llista)state.registre=r.llista;else state.registre=[];
  if(cr?.text){state.criterisText=cr.text;state.criterisGuardats=true;}
  else{state.criterisText="";state.criterisGuardats=false;}
  if(cr?.geminiKey){state.geminiKey=cr.geminiKey;state.geminiActiu=true;}
  else{state.geminiKey="";state.geminiActiu=false;}
  // Carregar URL del Sheets per aquesta etapa
  const urlGuardada=sGet("sheetsUrl");
  if(urlGuardada)state.driveUrl=urlGuardada;
  else state.driveUrl="";
}
function canviarEtapa(etapaId){
  state.etapa=etapaId;
  state.absentsAmbFranges=[];
  state.resultatsMultiple=null;
  state.canvisManuals={};
  state.fitxersCarregats=[];
  state.driveEstat=null;
  state.driveMsg="";
  loadUserData();
  render();
}

async function renovarToken(){
  return new Promise((resolve,reject)=>{
    if(!window.google){reject(new Error("Google no carregat"));return;}
    google.accounts.oauth2.initTokenClient({
      client_id:GOOGLE_CLIENT_ID,
      scope:"email profile https://www.googleapis.com/auth/spreadsheets.readonly",
      callback:(tokenResponse)=>{
        if(tokenResponse.access_token){
          currentUser={...currentUser,accessToken:tokenResponse.access_token};
          state.user=currentUser;
          localStorage.setItem("sup_accessToken",tokenResponse.access_token);
          resolve(tokenResponse.access_token);
        } else {
          reject(new Error("No s'ha pogut renovar el token"));
        }
      },
    }).requestAccessToken({prompt:"consent"});
  });
}

async function importarDrive(){
  if(!currentUser?.accessToken){loginWithGoogle();return;}
  const sheetsId=extractSheetsId(state.driveUrl);
  if(!sheetsId){setState({driveEstat:"error",driveMsg:"Enllaç no reconegut. Ha de ser un enllaç de Google Sheets."});return;}
  setState({isLoadingDrive:true,driveEstat:null,driveMsg:""});
  try{
    let token=currentUser.accessToken;
    let resultat;
    try{
      resultat=await llegirSheets(sheetsId,token);
    } catch(e){
      if(e.message.includes("401")){
        token=await renovarToken();
        resultat=await llegirSheets(sheetsId,token);
      } else throw e;
    }
    const{mestres:nous,franges}=resultat;
    const n=Object.keys(nous).length;
    if(!n)throw new Error("No s'ha pogut llegir cap mestre del Sheets.");
    const mestres={...nous};
    sSet("horaris",{mestres,franges});
    setState({mestres,franges,fitxersCarregats:Object.keys(nous).map(n=>({nom:n,ok:true})),driveEstat:"ok",driveMsg:n+" mestres importats correctament!",isLoadingDrive:false});

async function assignarAmbGemini(absentsAmbFranges, dia, mestres, franges, criterisText) {
  if (!state.geminiKey || !criterisText.trim()) return null;
  var lines = [];
  lines.push("Ets un assistent per gestionar suplencies d'urgencia en un centre educatiu.");
  lines.push("");
  lines.push("CRITERIS DE L'ESCOLA:");
  lines.push(criterisText);
  lines.push("");
  lines.push("SITUACIO:");
  lines.push("Dia: " + dia);
  lines.push("Mestres absents:");
  for (var i = 0; i < absentsAmbFranges.length; i++) {
    var a = absentsAmbFranges[i];
    lines.push("- " + a.nom + ": franges " + a.franges.join(", "));
  }
  lines.push("");
  lines.push("MESTRES DISPONIBLES PER FRANJA:");
  for (var j = 0; j < absentsAmbFranges.length; j++) {
    var absent = absentsAmbFranges[j];
    for (var k = 0; k < absent.franges.length; k++) {
      var franja = absent.franges[k];
      var label = (franges.find(function(f){return f.id===franja;})||{}).label || franja;
      lines.push(label + ":");
      var trovat = false;
      for (var nomM in mestres) {
        if (nomM === absent.nom.toUpperCase()) continue;
        var act = (mestres[nomM][dia]||{})[franja] || "";
        var t = tipusSuplent(act);
        if (t === "SUPORT_GENERAL" || t === "TP" || t === "LLIURE") {
          lines.push("  - " + nomM + " (" + (act||"Lliure") + ")");
          trovat = true;
        }
      }
      if (!trovat) lines.push("  (ningu disponible)");
    }
  }
  lines.push("");
  lines.push("Tenint en compte els criteris, proposa qui ha de fer cada suplencia.");
  lines.push("Respon NOMES en format JSON:");
  lines.push('{"assignacions":[{"absent":"NOM","franja":"ID","suplent":"NOM_SUPLENT","motiu":"breu"},...]}}');
  lines.push("Si no hi ha ningu, posa suplent:null.");
  var prompt = lines.join("\n");
  try {
    var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + state.geminiKey;
    var resp = await fetch(url, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        contents: [{parts: [{text: prompt}]}],
        generationConfig: {temperature: 0.1, maxOutputTokens: 1000}
      })
    });
    if (!resp.ok) throw new Error("Error Gemini: " + resp.status);
    var data = await resp.json();
    var text = ((((data.candidates||[])[0]||{}).content||{}).parts||[{text:""}])[0].text || "";
    var clean = text.replace(/```json/g,"").replace(/```/g,"").trim();
    return JSON.parse(clean);
  } catch(e) {
    console.error("Error Gemini:", e);
    return null;
  }
}


window.handleCerca=async()=>{
  const absentPerFranja={};
  for(const{nom,franges:fs}of state.absentsAmbFranges)for(const f of fs){if(!absentPerFranja[f])absentPerFranja[f]=[];absentPerFranja[f].push(nom);}
  const totsAbsents=state.absentsAmbFranges.map(a=>a.nom);
  // Calcular primer amb lògica bàsica
  const resultatBase=assignacioMultiple(state.mestres,totsAbsents,state.diaC,Object.keys(absentPerFranja),absentPerFranja,state.franges);
  setState({resultatsMultiple:resultatBase,canvisManuals:{},geminiEstat:null});
  // Si Gemini actiu i hi ha criteris, aplicar per sobre
  if(state.geminiActiu&&state.geminiKey&&state.criterisText.trim()){
    setState({geminiEstat:"carregant"});
    const geminiResp=await assignarAmbGemini(state.absentsAmbFranges,state.diaC,state.mestres,state.franges,state.criterisText);
    if(geminiResp?.assignacions){
      const canvis={};
      for(const a of geminiResp.assignacions){
        if(a.suplent){
          const clau=a.franja+"__"+a.absent.toUpperCase();
          canvis[clau]=a.suplent.toUpperCase();
        }
      }
      setState({canvisManuals:canvis,geminiEstat:"ok"});
    } else {
      setState({geminiEstat:"error"});
    }
  }
};
window.assignarUn=(franja,absent)=>{

  const suplentFinal=state.canvisManuals[clau]||a.suplent;
  if(!suplentFinal)return;
  const nou={id:Date.now()+Math.random(),absent,suplent:suplentFinal,dia:state.diaC,franja,prioritat:a.p,motiu:a.motiu,ts:new Date().toLocaleTimeString("ca",{hour:"2-digit",minute:"2-digit"})};

window.assignarTot=()=>{
  if(!state.resultatsMultiple)return;
  const noves=[];
  for(const[franja,assignacions]of Object.entries(state.resultatsMultiple)){
    for(const a of assignacions){
      if(a.p===-1)continue;
      const clau=franja+"__"+a.absent;
      const sf=state.canvisManuals[clau]||a.suplent;
      if(!sf)continue;
      noves.push({id:Date.now()+Math.random(),absent:a.absent,suplent:sf,dia:state.diaC,franja,prioritat:a.p,motiu:a.motiu,ts:new Date().toLocaleTimeString("ca",{hour:"2-digit",minute:"2-digit"})});
    }
  }
  const novaLlista=[...noves,...state.registre];
  sSet("registre",{llista:novaLlista});
  setState({registre:novaLlista});
};
